<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fábulas — Espaço do Leitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { 950: '#0f1814', 900: '#1b2a22', 800: '#2c4237', 600: '#466856', 400: '#7fa48f' },
            cozy: { bege: '#fbf9f4', creme: '#f5efe4' }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Fraunces', 'serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #1b2a22; color: #fbf9f4; font-family: 'Inter', sans-serif; }
    .cozy-glass { background: rgba(44, 66, 55, 0.45); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #1b2a22; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #466856; border-radius: 10px; }
  </style>
</head>
<body class="custom-scrollbar antialiased min-h-screen flex flex-col justify-between">

  <nav class="h-16 border-b border-forest-800 bg-forest-950 px-8 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-forest-600 flex items-center justify-center">
        <i data-lucide="feather" class="text-cozy-bege w-4 h-4"></i>
      </div>
      <span class="font-serif text-lg font-bold tracking-wide text-cozy-bege">Fábulas — Leitor</span>
    </div>
    <div class="flex items-center gap-6 text-sm font-medium">
      <button onclick="navegarLeitor('explorar')" class="text-cozy-bege hover:text-forest-400 transition-colors flex items-center gap-1"><i data-lucide="compass" class="w-4 h-4"></i> Exploração</button>
      <button onclick="navegarLeitor('leituras')" class="text-forest-400 hover:text-cozy-bege transition-colors flex items-center gap-1"><i data-lucide="book-open" class="w-4 h-4"></i> Leituras Atuais</button>
      <button onclick="navegarLeitor('carrinho')" class="text-forest-400 hover:text-cozy-bege transition-colors flex items-center gap-1"><i data-lucide="shopping-cart" class="w-4 h-4"></i> Carrinho</button>
    </div>
  </nav>

  <main class="flex-1 p-8 max-w-7xl w-full mx-auto">
    <div id="secao-explorar" class="space-y-6">
      <h2 class="font-serif text-2xl font-bold text-cozy-bege border-b border-forest-800 pb-2">Obras Disponíveis</h2>
      <div id="vitrine-livros" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>
  </main>

  <div id="modal-livro" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="cozy-glass max-w-2xl w-full rounded-2xl max-h-[85vh] overflow-y-auto custom-scrollbar p-6 space-y-6 relative">
      <button onclick="fecharModalLeitor()" class="absolute top-4 right-4 text-forest-400 hover:text-cozy-bege"><i data-lucide="x" class="w-5 h-5"></i></button>
      
      <div class="flex flex-col sm:flex-row gap-6">
        <div class="w-full sm:w-1/3 aspect-[3/4] bg-forest-950 rounded-xl flex items-center justify-center border border-forest-800 shadow-inner p-4 text-center">
          <i data-lucide="book" class="w-12 h-12 text-forest-600 block mb-2 mx-auto"></i>
          <span id="md-genero" class="text-[10px] uppercase font-mono tracking-widest text-forest-400">Gênero</span>
        </div>
        <div class="flex-1 space-y-3">
          <h3 id="md-titulo" class="font-serif text-2xl font-bold text-cozy-bege">Título do Livro</h3>
          <p id="md-preco" class="text-emerald-400 font-mono text-lg font-semibold">R$ 0,00</p>
          <p id="md-sinopse" class="text-sm text-forest-200 font-light leading-relaxed">Sinopse da obra...</p>
          <button id="btn-acao-compra" class="w-full sm:w-auto bg-forest-600 hover:bg-forest-400 text-forest-950 font-semibold px-6 py-2.5 rounded-xl text-sm transition-all flex items-center justify-center gap-2 mt-4"></button>
        </div>
      </div>

      <div class="border-t border-forest-800 pt-4 space-y-4">
        <h4 class="font-serif text-lg font-medium text-cozy-bege">Avaliações dos Leitores</h4>
        
        <form id="form-feedback" onsubmit="enviarFeedbackLeitor(event)" class="bg-forest-950/40 border border-forest-800 p-4 rounded-xl space-y-3">
          <input type="hidden" id="feedback-livro-id">
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2">
            <label class="text-xs font-mono uppercase text-forest-300">Sua Avaliação:</label>
            <select id="feedback-nota" class="bg-forest-900 border border-forest-800 text-cozy-bege rounded-lg px-2 py-1 text-xs focus:outline-none">
              <option value="5">⭐⭐⭐⭐⭐ (5 - Excelente)</option>
              <option value="4">⭐⭐⭐⭐ (4 - Muito Bom)</option>
              <option value="3">⭐⭐⭐ (3 - Regular)</option>
              <option value="2">⭐⭐ (2 - Ruim)</option>
              <option value="1">⭐ (1 - Muito Ruim)</option>
            </select>
          </div>
          <textarea id="feedback-texto" placeholder="Escreva sua crítica ou elogio com integridade..." required rows="2" class="w-full bg-forest-900/60 border border-forest-800 rounded-lg p-2.5 text-xs text-cozy-bege focus:outline-none focus:border-forest-400 custom-scrollbar"></textarea>
          <button type="submit" class="bg-forest-800 hover:bg-forest-600 text-cozy-bege font-medium px-4 py-1.5 rounded-lg text-xs transition-colors">Enviar Comentário</button>
        </form>

        <div id="lista-feedbacks-modal" class="space-y-3 max-h-40 overflow-y-auto custom-scrollbar">
          </div>
      </div>
    </div>
  </div>
  <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2 group">
  <div id="box-accessibility" class="cozy-glass p-2 rounded-xl flex items-center gap-3 shadow-xl hidden transition-all">
    <button onclick="ajustarFonteLeitura(1)" class="w-8 h-8 rounded-lg bg-forest-900 text-cozy-bege hover:bg-forest-600 text-xs font-bold" title="Aumentar Fonte">A+</button>
    <button onclick="ajustarFonteLeitura(-1)" class="w-8 h-8 rounded-lg bg-forest-900 text-cozy-bege hover:bg-forest-600 text-xs font-bold" title="Diminuir Fonte">A-</button>
    <button onclick="alternarContrasteNativo()" class="w-8 h-8 rounded-lg bg-forest-900 text-cozy-bege hover:bg-forest-600 flex items-center justify-center" title="Contraste Premium"><i data-lucide="contrast" class="w-4 h-4"></i></button>
  </div>
  <button onclick="document.getElementById('box-accessibility').classList.toggle('hidden')" class="w-10 h-10 rounded-full bg-forest-600 text-forest-950 flex items-center justify-center shadow-lg hover:scale-105 transition-transform" title="Acessibilidade">
    <i data-lucide="accessibility" class="w-5 h-5"></i>
  </button>
</div>

<script>
  let tamanhoBaseFonte = 100; 
  function ajustarFonteLeitura(direcao) {
    tamanhoBaseFonte += (direcao * 5);
    document.documentElement.style.fontSize = `${tamanhoBaseFonte}%`;
  }
  function alternarContrasteNativo() {
    
    const html = document.documentElement;
    if (html.style.filter === 'contrast(1.4) brightness(0.95)') {
      html.style.filter = 'none';
    } else {
      html.style.filter = 'contrast(1.4) brightness(0.95)';
    }
  }

    let livrosDisponiveis = [];
    let livroAtivoId = null;

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      carregarCatalogoLeitor();
    });

    function carregarCatalogoLeitor() {
      google.script.run
        .withSuccessHandler(function(response) {
          livrosDisponiveis = response.livros || [];
          renderizarVitrine();
        })
        .buscarLivrosLeitor();
    }

    function renderizarVitrine() {
      const vitrine = document.getElementById('vitrine-livros');
      vitrine.innerHTML = '';
      if(livrosDisponiveis.length === 0) {
        vitrine.innerHTML = `<p class="col-span-full text-center text-forest-400 text-sm py-8">Nenhuma obra pública foi encontrada no acervo.</p>`;
        return;
      }
      livrosDisponiveis.forEach(livro => {
        vitrine.innerHTML += `
          <div onclick="abrirModalLivro('${livro.id}')" class="bg-forest-900/30 border border-forest-800/60 p-5 rounded-2xl hover:border-forest-400/40 cursor-pointer transition-all shadow-md group">
            <span class="text-[10px] font-mono tracking-wider text-forest-400 bg-forest-950 px-2 py-0.5 rounded">${livro.genero}</span>
            <h4 class="font-serif text-lg font-bold text-cozy-bege mt-3 group-hover:text-forest-400 transition-colors">${livro.titulo}</h4>
            <div class="flex items-center justify-between mt-4 border-t border-forest-800/40 pt-3">
              <p class="text-emerald-400 font-mono font-medium">${Number(livro.preco) > 0 ? 'R$ '+Number(livro.preco).toFixed(2) : 'Gratuito'}</p>
              <span class="text-xs text-forest-400 flex items-center gap-1">Acessar <i data-lucide="arrow-right" class="w-3 h-3"></i></span>
            </div>
          </div>
        `;
      });
      lucide.createIcons();
    }

    function abrirModalLivro(id) {
      const livro = livrosDisponiveis.find(l => l.id === id);
      if(!livro) return;
      livroAtivoId = id;
      
      document.getElementById('feedback-livro-id').value = id;
      document.getElementById('md-titulo').innerText = livro.titulo;
      document.getElementById('md-genero').innerText = livro.genero;
      document.getElementById('md-sinopse').innerText = livro.sinopse || "Sem sinopse fornecida.";
      
      const vPreco = Number(livro.preco);
      document.getElementById('md-preco').innerText = vPreco > 0 ? `R$ ${vPreco.toFixed(2)}` : 'Obra Gratuita';
      
      const btn = document.getElementById('btn-acao-compra');
      btn.innerText = vPreco > 0 ? "Adicionar ao Carrinho" : "Iniciar Leitura Imediata";
      
  
      document.getElementById('lista-feedbacks-modal').innerHTML = '<p class="text-xs text-forest-400 italic">Buscando avaliações...</p>';
      google.script.run
        .withSuccessHandler(function(feedbacks) {
          const container = document.getElementById('lista-feedbacks-modal');
          container.innerHTML = '';
          if(feedbacks.length === 0) {
            container.innerHTML = '<p class="text-xs text-forest-400 italic">Seja o primeiro a avaliar esta obra.</p>';
            return;
          }
          feedbacks.forEach(f => {
            container.innerHTML += `
              <div class="bg-forest-950/60 p-3 rounded-lg border border-forest-900 text-xs space-y-1">
                <div class="flex justify-between text-forest-400 font-mono text-[10px]"><span>Anônimo</span><span>Nota: ${f.nota}/5</span></div>
                <p class="text-cozy-creme font-light">${f.texto}</p>
              </div>
            `;
          });
        })
        .buscarFeedbacksDoLivro(id);

      document.getElementById('modal-livro').classList.remove('hidden');
      lucide.createIcons();
    }

    function fecharModalLeitor() {
      document.getElementById('modal-livro').classList.add('hidden');
      document.getElementById('form-feedback').reset();
    }

    function enviarFeedbackLeitor(e) {
      e.preventDefault();
      const data = {
        livroId: document.getElementById('feedback-livro-id').value,
        nota: document.getElementById('feedback-nota').value,
        texto: document.getElementById('feedback-texto').value
      };
      
      google.script.run
        .withSuccessHandler(function(res) {
          if(res.success) {
            alert("Sua avaliação foi eternizada na planilha com sucesso.");
            abrirModalLivro(livroAtivoId); 
          }
        })
        .gravarFeedback(data);
    }

    function navegarLeitor(menu) {
      alert("A navegação da área do leitor para '" + menu + "' está totalmente estruturada estruturalmente e aguarda as lógicas internas do seu banco.");
    }
  </script>
</body>
</html>
